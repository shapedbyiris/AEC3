name: windows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
          vs-version: '17.14'

      - name: Configure CMake
        run: >
          cmake
          -B build/${{ matrix.arch }}/${{ matrix.config }}
          -G "Visual Studio 17 2022"
          -A ${{ matrix.arch }}

      - name: Build
        run: >
          cmake
          --build build/${{ matrix.arch }}/${{ matrix.config }}
          --config ${{ matrix.config }}

      - name: Stage package files
        shell: pwsh
        run: |
          $outDir = "artifacts/${{ matrix.arch }}-${{ matrix.config }}"
          New-Item -ItemType Directory -Force $outDir | Out-Null

          Copy-Item "build/${{ matrix.arch }}/${{ matrix.config }}/${{ matrix.config }}/AEC3.lib" "$outDir/" -ErrorAction Stop
          Copy-Item "build/${{ matrix.arch }}/${{ matrix.config }}/${{ matrix.config }}/base.lib" "$outDir/" -ErrorAction Stop
          Copy-Item "build/${{ matrix.arch }}/${{ matrix.config }}/${{ matrix.config }}/api.lib" "$outDir/" -ErrorAction Stop

          Get-ChildItem "build/${{ matrix.arch }}/${{ matrix.config }}/${{ matrix.config }}" -Filter *.pdb -ErrorAction SilentlyContinue |
            Copy-Item -Destination $outDir -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.config }}
          path: artifacts/${{ matrix.arch }}-${{ matrix.config }}

  pack:
    needs: build
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Assemble NuGet payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output/Windows/x64-Debug   | Out-Null
          New-Item -ItemType Directory -Force output/Windows/x64-Release | Out-Null
          New-Item -ItemType Directory -Force output/Windows/ARM64-Debug   | Out-Null
          New-Item -ItemType Directory -Force output/Windows/ARM64-Release | Out-Null

          Copy-Item "downloaded/x64-Debug/*"     "output/Windows/x64-Debug/"     -Force
          Copy-Item "downloaded/x64-Release/*"   "output/Windows/x64-Release/"   -Force
          Copy-Item "downloaded/ARM64-Debug/*"   "output/Windows/ARM64-Debug/"   -Force
          Copy-Item "downloaded/ARM64-Release/*" "output/Windows/ARM64-Release/" -Force

      - name: Pack NuGet
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MMdd.HHmm"
          nuget pack shapedbyiris.aec3.nuspec -Properties "version=$version"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: "*.nupkg"

  publish:
    if: github.event_name != 'pull_request'
    needs: pack
    runs-on: windows-2022

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: pkg

      - name: Add GitHub Packages source
        shell: pwsh
        run: |
          nuget sources Add `
            -Name github `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.repository_owner }}" `
            -Password "${{ github.token }}"

      - name: Push package
        shell: pwsh
        run: |
          Get-ChildItem pkg -Filter *.nupkg | ForEach-Object {
            nuget push $_.FullName -Source github -SkipDuplicate -ApiKey "${{ github.token }}"
          }