name: windows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
          vs-version: '17.14'

      - name: Replace multiple files
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\Microsoft.VCToolsVersion.v143.default.props'
          search-text: '14.39.33519'
          replacement-text: '14.44.35207'
          encoding: 'utf8'

      - name: Configure CMake
        run: cmake -B build-${{ matrix.arch }} -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build Release
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Build Debug
        run: cmake --build build-${{ matrix.arch }} --config Debug

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output/Windows/${{ matrix.arch }}-Release | Out-Null
          New-Item -ItemType Directory -Force output/Windows/${{ matrix.arch }}-Debug   | Out-Null

          Copy-Item build-${{ matrix.arch }}/Release/AEC3.lib output/Windows/${{ matrix.arch }}-Release/
          Copy-Item build-${{ matrix.arch }}/Release/base.lib output/Windows/${{ matrix.arch }}-Release/
          Copy-Item build-${{ matrix.arch }}/Release/api.lib  output/Windows/${{ matrix.arch }}-Release/

          Copy-Item build-${{ matrix.arch }}/Debug/AEC3.lib output/Windows/${{ matrix.arch }}-Debug/
          Copy-Item build-${{ matrix.arch }}/Debug/base.lib output/Windows/${{ matrix.arch }}-Debug/
          Copy-Item build-${{ matrix.arch }}/Debug/api.lib  output/Windows/${{ matrix.arch }}-Debug/

          if (Test-Path build-${{ matrix.arch }}/Release/AEC3.pdb) { Copy-Item build-${{ matrix.arch }}/Release/*.pdb output/Windows/${{ matrix.arch }}-Release/ }
          if (Test-Path build-${{ matrix.arch }}/Debug/AEC3.pdb)   { Copy-Item build-${{ matrix.arch }}/Debug/*.pdb   output/Windows/${{ matrix.arch }}-Debug/ }

      - name: Pack NuGet
        if: matrix.arch == 'x64'
        run: nuget pack shapedbyiris.aec3.nuspec -p version=$((Get-Date).ToString("yyyy.MMdd.HHmm"))

      - name: Publish NuGet
        if: github.event_name != 'pull_request' && matrix.arch == 'x64'
        run: |
          nuget sources Add -Name github -Source https://nuget.pkg.github.com/${{github.repository_owner}}/index.json -Username ${{github.repository_owner}} -Password ${{github.token}}
          nuget push *.nupkg -Source github -SkipDuplicate -ApiKey ${{github.token}}