name: windows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
          vs-version: '17.14'

      - name: Configure CMake
        run: cmake -B build/${{ matrix.arch }} -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build/${{ matrix.arch }} --config ${{ matrix.config }}

      - name: Verify outputs
        shell: pwsh
        run: |
          $binDir = "output/Windows/${{ matrix.config }}_${{ matrix.arch }}"
          if (!(Test-Path $binDir))
          {
              throw "Expected output folder not found: $binDir"
          }

          Get-ChildItem $binDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.config }}
          path: output/Windows/${{ matrix.config }}_${{ matrix.arch }}

  pack:
    needs: build
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Reassemble output tree
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output/Windows/Debug_x64     | Out-Null
          New-Item -ItemType Directory -Force output/Windows/Release_x64   | Out-Null
          New-Item -ItemType Directory -Force output/Windows/Debug_ARM64   | Out-Null
          New-Item -ItemType Directory -Force output/Windows/Release_ARM64 | Out-Null

          Copy-Item "downloaded/x64-Debug/*"     "output/Windows/Debug_x64/"     -Force
          Copy-Item "downloaded/x64-Release/*"   "output/Windows/Release_x64/"   -Force
          Copy-Item "downloaded/ARM64-Debug/*"   "output/Windows/Debug_ARM64/"   -Force
          Copy-Item "downloaded/ARM64-Release/*" "output/Windows/Release_ARM64/" -Force

      - name: Show assembled output
        shell: pwsh
        run: |
          Get-ChildItem output/Windows -Recurse

      - name: Pack NuGet
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MMdd.HHmm"
          nuget pack shapedbyiris.aec3.nuspec -Properties "version=$version"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: "*.nupkg"

  publish:
    if: github.event_name != 'pull_request'
    needs: pack
    runs-on: windows-2022

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: pkg

      - name: Add GitHub Packages source
        shell: pwsh
        run: |
          nuget sources Add `
            -Name github `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.repository_owner }}" `
            -Password "${{ github.token }}"

      - name: Push package
        shell: pwsh
        run: |
          Get-ChildItem pkg -Filter *.nupkg | ForEach-Object {
              nuget push $_.FullName -Source github -SkipDuplicate -ApiKey "${{ github.token }}"
          }